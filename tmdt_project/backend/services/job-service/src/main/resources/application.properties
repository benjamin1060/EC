server.port=8082

spring.application.name=job-service

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nhom611_job}
spring.data.mongodb.auto-index-creation=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

auth.jwt.secret=${AUTH_JWT_SECRET:}

# Comma-separated origins, e.g. http://localhost:3000
auth.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

logging.level.root=INFO
logging.level.com.nhom611=DEBUG
logging.level.org.springframework.web=INFO

# MinIO configuration
storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
storage.minio.bucket=${MINIO_BUCKET:proposal-files}
