server:
  port: 8082

spring:
  application:
    name: job-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nhom611_job}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:aVeryLongSecretKeyForPhysicalLaborRecruitmentPlatform12345!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.nhom611: DEBUG
    org.springframework.web: INFO

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:proposal-files}
