server.port=8081

spring.application.name=user-service

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nhom611_user}
spring.data.mongodb.auto-index-creation=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

auth.jwt.secret=${AUTH_JWT_SECRET:aVeryLongSecretKeyForPhysicalLaborRecruitmentPlatform12345!}
auth.jwt.access-ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:3600}

auth.refresh.ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:604800}
auth.refresh.cookie.name=${REFRESH_COOKIE_NAME:refresh_token}
auth.refresh.cookie.path=${REFRESH_COOKIE_PATH:/auth}
auth.refresh.cookie.secure=${REFRESH_COOKIE_SECURE:false}
auth.refresh.cookie.same-site=${REFRESH_COOKIE_SAMESITE:Lax}

# Comma-separated origins, e.g. http://localhost:3000
auth.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}